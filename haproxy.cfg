frontend http-in
    bind *:80
    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # redirect scheme https code 301 if !{ ssl_fc }
    
    # Define ACLs based on paths or hostnames
    acl is_ollama path_beg /api || path_beg /v1
    acl is_openclaw path_beg /

    # Route to backends
    use_backend ollama_backend if is_ollama
    default_backend openclaw_backend

backend ollama_backend
    # Add Basic Auth for security
    userlist auth_users
        user admin insecure-password yourpassword
    
    acl authenticated http_auth(auth_users)
    http-request auth realm "Ollama" if !authenticated
    
    server ollama_srv 127.0.0.1:11434 check

backend openclaw_backend
    server openclaw_srv 127.0.0.1:3000 check