<VirtualHost *:80>
    ServerName yourdomain.com
    
    # Redirect HTTP to HTTPS (Requires mod_rewrite)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName yourdomain.com

    # Requires mod_ssl
    SSLEngine on
    SSLCertificateFile /path/to/cert.pem
    SSLCertificateKeyFile /path/to/privkey.pem

    # Security: Basic Auth
    <Location />
        AuthType Basic
        AuthName "Restricted Access"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Location>

    # Proxy OpenClaw
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Proxy Ollama
    ProxyPass /api/ http://127.0.0.1:11434/api/
    ProxyPassReverse /api/ http://127.0.0.1:11434/api/
</VirtualHost>