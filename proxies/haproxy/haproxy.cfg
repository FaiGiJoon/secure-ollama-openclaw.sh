# Define users for Basic Auth
userlist auth_users
    user admin insecure-password YourSecurePassword

global
    # Global settings here

defaults
    timeout tunnel 3600s
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    mode http

frontend http-in
    bind *:80
    
    # Define ACLs based on paths
    acl is_ollama path_beg /ollama
    acl is_openclaw path / or path_beg /_next or path_beg /static

    # Authentication
    acl authenticated http_auth(auth_users)
    http-request auth realm "Restricted Access" if !authenticated

    # Route to backends
    use_backend ollama_backend if is_ollama
    default_backend openclaw_backend

backend ollama_backend
    # Strip /ollama prefix
    http-request set-path %[path,regsub(^/ollama/?,/)]

    # Security: Strip Origin header to prevent insecure wildcard CORS
    http-request del-header Origin

    server ollama_srv 127.0.0.1:11434 check

backend openclaw_backend
    server openclaw_srv 127.0.0.1:3000 check
