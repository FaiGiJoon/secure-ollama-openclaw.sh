static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              - match:
                  prefix: "/ollama"
                route:
                  cluster: ollama_service
                  prefix_rewrite: "/"
                  timeout: 3600s
                  # Security: Remove Origin header to prevent insecure CORS responses from Ollama
                  request_headers_to_remove: ["origin"]
              - match:
                  prefix: "/"
                route:
                  cluster: openclaw_service
                  timeout: 60s
          http_filters:
          # Note: Basic Auth in Envoy typically requires an External Authorization filter
          # or a specific Lua filter for simple cases.
          # For brevity and consistency, we acknowledge it here.
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: ollama_service
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: ollama_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 11434
  - name: openclaw_service
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: openclaw_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 3000
