_format_version: "3.0"
_transform: true

services:
  - name: ollama-service
    url: http://127.0.0.1:11434
    routes:
      - name: ollama-route
        paths:
          - /ollama
        strip_path: true
    plugins:
      - name: basic-auth
      - name: request-transformer
        config:
          remove:
            headers:
              - origin
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Frame-Options: SAMEORIGIN"
              - "X-Content-Type-Options: nosniff"
              - "Referrer-Policy: strict-origin-when-cross-origin"

  - name: openclaw-service
    url: http://127.0.0.1:3000
    routes:
      - name: openclaw-route
        paths:
          - /
    plugins:
      - name: basic-auth
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Frame-Options: SAMEORIGIN"
              - "X-Content-Type-Options: nosniff"
              - "Referrer-Policy: strict-origin-when-cross-origin"

consumers:
  - username: admin
    basicauth_credentials:
      - username: admin
        password: YourSecurePassword
