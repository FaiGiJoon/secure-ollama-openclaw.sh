version: '3'

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=false"
      - "--providers.docker=false"
      - "--providers.file.filename=/etc/traefik/dynamic_conf.yml"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - ./dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
    # For a local setup, Traefik needs to be able to reach 127.0.0.1 on the host
    # This often requires extra_hosts or using the host network
    network_mode: host
