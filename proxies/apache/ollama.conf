<VirtualHost *:80>
    ServerName yourdomain.com

    # Security Headers
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Content-Type-Options "nosniff"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # Redirect HTTP to HTTPS (Requires mod_rewrite)
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]

    # Security: Basic Auth
    <Location />
        AuthType Basic
        AuthName "Restricted Access"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Location>

    # Proxy settings
    ProxyRequests Off
    ProxyPreserveHost On

    # Streaming optimizations for Ollama
    <Location /ollama/>
        # Disable proxy buffering for streaming
        SetEnv proxy-nokeepalive 1
        SetEnv proxy-sendchunked 1
        # Clear Origin to bypass Ollama's local CORS check
        RequestHeader unset Origin
    </Location>

    # Proxy Ollama
    # Note: Trailing slashes are important for path stripping
    ProxyPass /ollama/ http://127.0.0.1:11434/
    ProxyPassReverse /ollama/ http://127.0.0.1:11434/

    # Proxy OpenClaw
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
